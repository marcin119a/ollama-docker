version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-t4
    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    environment:
      - OLLAMA_KEEP_ALIVE=24h

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    runtime: nvidia

    entrypoint: ["/bin/bash", "-c"]

    command: |
      ollama serve &
      sleep 8
      ollama pull qwen2.5:3b
      ollama pull mxbai-embed-large
      wait

volumes:
  ollama_data:
